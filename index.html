<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jennifers Bio-Lernquiz 🧬</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #00b894;
            --bg: #ffeaa7;
            --text: #2d3436;
            --card-front-border: #74b9ff;
            --card-back-border: #fd79a8;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #ffeaa7 0%, #dfe6e9 100%);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 15px;
        }

        h1 {
            margin-bottom: 5px;
            color: var(--primary);
            font-size: 1.8rem;
        }

        header p {
            font-size: 1rem;
            color: #636e72;
        }

        .select-container {
            margin-bottom: 20px;
            width: 100%;
            max-width: 550px;
        }

        select {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border-radius: 12px;
            border: 3px solid var(--primary);
            background: white;
            cursor: pointer;
            outline: none;
            font-weight: 600;
        }

        .card-container {
            width: 100%;
            max-width: 550px;
            height: 400px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 16px;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 25px 35px;
            box-sizing: border-box;
            text-align: center;
            overflow-y: auto;
        }

        .card-front {
            background: white;
            border-top: 8px solid var(--card-front-border);
        }

        .card-back {
            background: #f8f9fa;
            transform: rotateY(180deg);
            border-top: 8px solid var(--card-back-border);
        }

        .category-badge {
            position: absolute;
            top: 12px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            color: white;
            background: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .card-text {
            font-size: 1.15rem;
            line-height: 1.6;
            font-weight: 500;
            margin-top: 10px;
        }

        .card-text img {
            max-width: 150px;
            width: 100%;
            margin-top: 8px;
            border-radius: 8px;
            border: 2px solid #dfe6e9;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .hint {
            position: absolute;
            bottom: 12px;
            font-size: 0.85rem;
            color: #b2bec3;
            font-style: italic;
        }

        .controls {
            margin-top: 25px;
            display: flex;
            gap: 15px;
            align-items: center;
            width: 100%;
            max-width: 550px;
            justify-content: space-between;
        }

        button {
            padding: 14px 22px;
            font-size: 15px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            background-color: var(--primary);
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.3);
        }

        button:disabled {
            background-color: #dfe6e9;
            color: #b2bec3;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .progress {
            font-weight: 700;
            font-size: 15px;
            min-width: 70px;
            text-align: center;
            color: var(--primary);
        }

        .score-bar {
            margin-top: 15px;
            width: 100%;
            max-width: 550px;
            text-align: center;
            font-size: 0.9rem;
            color: #636e72;
        }
    </style>
</head>
<body>

    <header>
        <h1>🧬 Jennifers Bio-Quiz</h1>
        <p>Tippe auf die Karte, um die Antwort zu sehen! 👆</p>
    </header>

    <div class="select-container">
        <select id="topic-select" onchange="changeTopic()">
            <option value="alle">🎯 Alle Themen gemischt</option>
            <option value="Bewegungsapparat">🦴 1. Der Bewegungsapparat</option>
            <option value="Nase">👃 2. Die Nase</option>
            <option value="Zunge">👅 3. Die Zunge</option>
            <option value="Gehirn">🧠 4. Das Gehirn</option>
            <option value="Lunge">🫁 5. Die Lunge</option>
            <option value="Ohr">👂 6. Das Ohr</option>
            <option value="Abwehrsystem">🛡️ 7. Das Abwehrsystem</option>
            <option value="Verdauung">🍏 8. Das Verdauungssystem</option>
            <option value="Herz">❤️ 9. Das Herz</option>
            <option value="Auge">👁️ 10. Das Auge</option>
        </select>
    </div>

    <div class="card-container" onclick="flipCard()">
        <div class="card" id="flashcard">
            <div class="card-face card-front">
                <span class="category-badge" id="card-cat-front">Kategorie</span>
                <div class="card-text" id="card-q">Frage lädt...</div>
                <div class="hint">🔄 Klicken zum Umdrehen</div>
            </div>
            <div class="card-face card-back">
                <span class="category-badge" id="card-cat-back">Lösung</span>
                <div class="card-text" id="card-a">Antwort lädt...</div>
                <div class="hint">🔄 Klicken für nächste Frage</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="prev-btn" onclick="prevCard(event)">⬅️ Zurück</button>
        <span class="progress" id="progress-text">0 / 0</span>
        <button id="next-btn" onclick="nextCard(event)">Weiter ➡️</button>
    </div>

    <div class="score-bar" id="score-bar">Viel Erfolg beim Lernen! 🌟</div>

        ];

        let currentCards = [...allCards];
        let currentIndex = 0;

        function updateCard() {
            const cardEl = document.getElementById('flashcard');
            cardEl.classList.remove('flipped');

            if (currentCards.length === 0) {
                document.getElementById('card-q').innerHTML = "Keine Karten hier! Wähle ein Thema oben. ☝️";
                document.getElementById('card-a').innerHTML = "";
                document.getElementById('progress-text').innerText = "0 / 0";
                return;
            }

            setTimeout(() => {
                const card = currentCards[currentIndex];
                document.getElementById('card-q').innerHTML = card.q;
                document.getElementById('card-a').innerHTML = card.a;
                document.getElementById('card-cat-front').innerText = card.cat;
                document.getElementById('card-cat-back').innerText = "✅ Lösung";
                document.getElementById('progress-text').innerText = (currentIndex + 1) + " / " + currentCards.length;

                document.getElementById('prev-btn').disabled = currentIndex === 0;
                document.getElementById('next-btn').disabled = currentIndex === currentCards.length - 1;
            }, cardEl.classList.contains('flipped') ? 250 : 0);
        }

        function flipCard() {
            if (currentCards.length === 0) return;
            document.getElementById('flashcard').classList.toggle('flipped');
        }

        function nextCard(event) {
            event.stopPropagation();
            if (currentIndex < currentCards.length - 1) {
                currentIndex++;
                updateCard();
            }
        }

        function prevCard(event) {
            event.stopPropagation();
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        }

        function changeTopic() {
            const selectedTopic = document.getElementById('topic-select').value;
            if (selectedTopic === 'alle') {
                currentCards = [...allCards];
            } else {
                currentCards = allCards.filter(card => card.cat === selectedTopic);
            }
            currentIndex = 0;
            updateCard();
        }

        // App-Start
        updateCard();
    </script>
</body>
</html>
